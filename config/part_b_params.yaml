part_b_state_machine:
  ros__parameters:
    drive_topic_out: "/vesc/high_level/input/navigation"
    nav_input_topic: "/vesc/high_level/input/nav_0"
    park_input_topic: "/vesc/high_level/input/nav_1"
    odom_topic: "/pf/pose/odom"
    parked_stable_sec: 2.0
    park_hold_sec: 5.0
    return_to_start: false
    tick_hz: 20.0

yolo_detector:
  ros__parameters:
    model: "yolo11n.pt"
    conf_threshold: 0.2
    iou_threshold: 0.7
    top_crop_fraction: 0.5
    image_topic: "/zed/zed_node/rgb/image_rect_color"
    red_pixel_fraction: 0.05
    traffic_light_min_area: 20

image_saver:
  ros__parameters:
    image_topic: "/part_b/debug_image"
    save_dir: "saved_parks"

shell_point_mock:
  ros__parameters:
    topic: "/shell_points"
    delay_sec: 2.0

trajectory_follower:
  ros__parameters:
    speed: 0.5
